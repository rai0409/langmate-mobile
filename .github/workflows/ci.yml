name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Typecheck, rules, Functions E2E, and web export
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Set up Java 21 for Firebase Emulator Suite
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install app dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: TypeScript check
        run: npm run test:types

      - name: Firestore rules tests
        run: npm run test:rules

      - name: Server unread Functions E2E
        run: npm run test:functions:unread

      - name: Server match creation Functions E2E
        run: npm run test:functions:match

      - name: Push provider unit tests
        run: npm --prefix functions run test:push:unit

      - name: Push Functions E2E (fake provider)
        run: npm run test:functions:push

      - name: Export Expo Web
        run: npx expo export --platform web

      - name: Build Firebase Functions
        run: npm --prefix functions run build
